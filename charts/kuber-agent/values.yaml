# Default values for agent-operator
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Operator image configuration
image:
  repository: europe-docker.pkg.dev/severalnines-public/clustercontrol/kuber-agent
  tag: "" # Default tag is empty; deployment template will use Chart.AppVersion if not overridden
  pullPolicy: Always
  useDevelopmentImage: false # Set to true to use the developmentImageTag
  developmentImageTag: "main-dev-latest" # The tag for your 'latest' development build
  pullSecrets: [] # Optional list of imagePullSecrets, e.g. [{name: regcred}]


# Agent configuration
agent:
  # Public key for agent authentication
  publicKey: ""
  # Name for the agent (defaults to the node name if not set)
  name: ""

# Environment setting (determines default log level if debug.logLevel is not set)
env: production # Set to "development" for debug logging by default

# Namespace configuration
nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""
createNamespace: true

# Controller manager configuration
controllerManager:
  replicas: 1
  manager:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi
  # Health probe configuration
  healthProbe:
    port: 8082

  # Optional: run only a subset of controllers. Empty = all
  # Valid: databasecluster, databaseoperator, databasebackupschedule, databasebackup, appbundle, gc
  controllers: []

# Dev overrides (command/startupProbe) - enabled via values
dev:
  enabled: false
  command: ["/usr/local/bin/devloop-operator.sh"]
  startupProbe:
    httpGet:
      path: /healthz
      port: 8082
    failureThreshold: 120
    periodSeconds: 2
  disableProbes: true
  persistentCache:
    enabled: true
    create: false
    pvcName: operator-cache
    storageClassName: local-path
  resources: {}

metrics:
  enabled: true
  port: 8081
  secure: false
  service:
    enabled: true
    type: ClusterIP


rbac:
  create: true
  serviceAccounts:
    agent:
      name: agent-operator-controller-manager
      create: true
    write:
      name: agent-operator-controller-manager-write
      create: true
  clusterRead:
    includeSecrets: false      # when true, also bind s9s:cluster-read-extra per namespace
  namespaces:
    targets: []            # e.g. ["app-a", "app-b"]
    create: false          # optionally create target namespaces

mode:
  write:
    enabled: false   # when true: bind agent-write SA to s9s:cluster-write cluster-wide

# Proxy configuration for connecting to ClusterControl server
proxy:
  grpcAddress: "host.docker.internal:50051"

# Debug settings
debug:
  logLevel: "" # Explicitly set log level (e.g., "debug", "info"). Overrides the default based on 'env'.

# Cleanup configuration
# Use: helm uninstall <release-name> --set cleanup.enabled=true
cleanup:
  # Enable comprehensive cleanup during helm uninstall
  # This will delete database clusters, operators, and CRDs in proper order
  enabled: false
  
  # Timeout for each cleanup phase (in seconds)
  timeoutSeconds: 300
  
  # Image to use for cleanup jobs (kubectl image)
  image:
    repository: bitnami/kubectl
    tag: "1.28"
    pullPolicy: IfNotPresent
  
  # Resource limits for cleanup jobs
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# GitOps integration (controllers must be installed separately; no bootstrapping here)
gitops:
  enabled: false
  # tool: "argo" | "flux"
  tool: "argo"
  argo:
    namespace: "argocd"
  flux:
    namespace: "flux-system"

# Prometheus monitoring (CLUS-7569). Two addons share this config block:
# `prometheus-stack` installs the upstream operator chart; `prometheus-agent`
# ships the PrometheusAgent CR that scrapes the cluster and remote_writes to
# a Prom the customer specifies (CC's cmon-side Prom by default).
# Spec: docs/observability/features/prometheus-agent.md.
prometheusStack:
  # Activates the `prometheus-community/kube-prometheus-stack` delivery addon.
  # By default it installs operator/CRDs only (decisions-log.md D13); bundled
  # Prometheus and Grafana are opt-in below.
  enabled: false
  # User runs Prometheus Operator/CRDs out-of-band. With no bundled components
  # selected, the stack addon stands down. If bundled Grafana or Prometheus is
  # selected, the addon still ships kube-prometheus-stack with operator/CRD
  # ownership disabled.
  preInstalled: false
  # Override the addon's pinned kube-prometheus-stack version. Empty = use
  # the addon's default pin.
  chartVersion: ""
  prometheus:
    # Enables the bundled Prometheus server from the current monitoring
    # delivery bundle. When `preInstalled=true`, this creates only the
    # Prometheus CR/services and relies on the user's operator/CRDs.
    enabled: false
    service:
      type: ClusterIP
      nodePort: ""
  grafana:
    # Optional bundled Grafana from kube-prometheus-stack. Can be enabled with
    # either addon-managed or pre-installed operator/CRDs.
    enabled: false
    service:
      type: ClusterIP
      nodePort: ""

prometheusAgent:
  # Activates the addon. When true, `prometheusStack.enabled` OR
  # `prometheusStack.preInstalled` must also be true — the
  # PrometheusAgent CRD has to come from somewhere. Cross-addon validation
  # in the agent-operator's config-load fails fast on the misconfiguration.
  enabled: false
  # `kubernetes_cluster` external label stamped on every series. UI
  # prefills with the agent name; required when enabled=true.
  clusterLabel: ""
  remoteWrite:
    # `remote_write` target URL. UI prefills with `https://<cc-host>:9090`.
    # Required when enabled=true.
    url: ""
    auth:
      # Only `basic` is wired in v1 (none / bearer / mTLS deferred — see
      # decisions-log.md D11). The PrometheusAgent CR's
      # `remoteWrite.basicAuth` references the Secret named below.
      type: basic
      # Secret with keys `username` + `password`. The chart never creates this
      # Secret and never receives the password. Leave empty to use the addon's
      # default name, `cmon-prom-auth`; the install manifests generated by the
      # UI create that Secret in the `observability` namespace.
      existingSecret: ""
    tls:
      # CC ships self-signed certs by default (CN=127.0.0.1, SAN=localhost) —
      # verifying would fail out of the box. Customers with proper certs
      # flip this off.
      insecureSkipVerify: true

# SOPS GitOps-secrets pipeline (CLUS-7183).
# Pipeline activates when sops.enabled=true AND gitops.enabled=true.
# Spec: Projects/kuber-cc-gitops-secrets/specs/.
sops:
  # Enables the sops-encryption controller and the SOPS addon (which
  # installs sops-secrets-operator + the keygen Job).
  enabled: false
  # When true, the user pre-applies sops-age-key + sops-age-pubkey themselves
  # and the addon ships only the AppBundle (no keygen Job + RBAC).
  byoKeys: false
  # When true, the user runs their own sops-secrets-operator out-of-band; the
  # addon stands down (no AppBundle, no keygen).
  preInstalled: false
  # Keygen Job base image. Must ship kubectl pre-installed AND have apk
  # available; alpine/k8s is the community image that fits both. The Job
  # uses kubectl for the check-before-write gate (no package install needed
  # on idempotent re-runs) and apk to fetch `age` only when keys must be
  # generated. No off-the-shelf image bundles age + kubectl together; the
  # project chose this combination over maintaining a custom keygen image.
  keygenImage: "alpine/k8s:1.31.5"

# AppBundle importer configuration
appBundleImport:
  enabled: true               # Enable background importer to create AppBundle CRs from Argo/Flux
  provider: ""                # argo | flux | "" (both)
  interval: "1m"              # Sweep interval (e.g., 30s, 1m)
  crNamespace: ""             # Namespace to create AppBundle CRs (default: POD_NAMESPACE when empty)
  manageLifecycle: false       # Set spec.manageLifecycle on generated CRs

# Controller authentication (token used by controller for GitOps PRs/commits)
controllerAuth:
  secret:
    enabled: false
    name: ""   # e.g. s9s-gitops-token
    key: "token"
    value: ""
  provider: "github"   # keep option for future providers; current: github
  baseURL: ""          # optional base URL for GitHub Enterprise
