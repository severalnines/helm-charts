apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-operator.fullname" . }}-controller-manager
  namespace: {{ include "agent-operator.namespace" . }}
  labels:
    control-plane: controller-manager
    {{- include "agent-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "agent-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
        {{- include "agent-operator.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: manager
        helm.sh/release.revision: {{ .Release.Revision | quote }}
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      {{- if .Values.dev.enabled }}
      initContainers:
      - name: prewarm-caches
        image: "{{ .Values.image.repository }}:{{ if .Values.image.useDevelopmentImage }}{{ .Values.image.developmentImageTag }}{{ else }}{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
        imagePullPolicy: {{ 
          .Values.image.pullPolicy 
        }}
        command: ["/bin/sh","-lc"]
        args:
          - |
            if [ -f /workspace/agent-operator/go.mod ]; then
              cd /workspace/agent-operator && timeout 180 /usr/local/go/bin/go mod download || true;
            else
              echo "[prewarm] /workspace/agent-operator/go.mod not found, skipping";
            fi
        env:
        - name: GOMODCACHE
          value: /home/nonroot/go/pkg/mod
        - name: GOCACHE
          value: /home/nonroot/.cache/go-build
        - name: GOWORK
          value: /workspace/go.work
        - name: GOPROXY
          value: https://proxy.golang.org,direct
        volumeMounts:
        - name: go-cache
          mountPath: /home/nonroot/go/pkg/mod
          subPath: gomod
        - name: go-cache
          mountPath: /home/nonroot/.cache/go-build
          subPath: gobuild
      {{- end }}
      containers:
      - name: manager
        {{- if .Values.dev.enabled }}
        command: {{ toJson .Values.dev.command }}
        {{- end }}
        image: "{{ .Values.image.repository | default (include "agent-operator.imageRepositoryDefault" .) }}:{{ if .Values.image.useDevelopmentImage }}{{ .Values.image.developmentImageTag }}{{ else }}{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | default (include "agent-operator.imagePullPolicyDefault" .) }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        {{- if .Values.metrics.enabled }}
        ports:
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        {{- end }}
        args:
        - "--health-probe-bind-address=:{{ .Values.controllerManager.healthProbe.port }}"
        {{- if .Values.metrics.enabled }}
        - "--metrics-bind-address=:{{ .Values.metrics.port }}"
        {{- else }}
        - "--metrics-bind-address=0"
        {{- end }}
        - "--metrics-secure={{ ternary "true" "false" .Values.metrics.secure }}"
        - "--leader-elect"
        - "--env={{ .Values.env }}"
        {{- if .Values.controllerManager.controllers }}
        - "--controllers={{ join "," .Values.controllerManager.controllers }}"
        {{- end }}
        {{- if .Values.debug.logLevel }}
        - "--log-level={{ .Values.debug.logLevel }}"
        {{- end }}
        env:
        - name: PROXY_GRPC_ADDRESS
          value: {{ .Values.proxy.grpcAddress }}
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- if .Values.agent.name }}
        - name: AGENT_NAME
          value: {{ .Values.agent.name }}
        {{- end }}
        # GitOps hints
        - name: ARGOCD_NAMESPACE
          value: {{ .Values.gitops.argo.namespace | quote }}
        - name: FLUX_NAMESPACE
          value: {{ .Values.gitops.flux.namespace | quote }}
        {{- if .Values.gitops.enabled }}
        - name: GITOPS_ENABLED
          value: "true"
        # GitOps mode requires the new translators (agent errors out otherwise)
        - name: USE_NEW_TRANSLATORS
          value: "true"
        {{- end }}
        # SOPS GitOps-secrets pipeline (CLUS-7183). Addon + controllers read
        # POD_NAMESPACE for their agent namespace; SOPS_NAMESPACE is hardcoded
        # in the addon's Config — no duplicate env vars needed here.
        {{- if .Values.sops.enabled }}
        - name: SOPS_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.sops.byoKeys }}
        - name: SOPS_BYO_KEYS
          value: "true"
        {{- end }}
        {{- if .Values.sops.preInstalled }}
        - name: SOPS_PRE_INSTALLED
          value: "true"
        {{- end }}
        {{- if .Values.sops.keygenImage }}
        - name: KEYGEN_IMAGE
          value: {{ .Values.sops.keygenImage | quote }}
        {{- end }}
        # Prometheus monitoring (CLUS-7569). Two addons share this block:
        # prometheus-stack installs the upstream chart, prometheus-agent ships
        # the PrometheusAgent CR. The password is intentionally NOT passed
        # as an env var — the addon only reads the Secret name and the
        # PrometheusAgent CR's basicAuth refs handle the resolution
        # in-cluster.
        {{- if .Values.prometheusStack.enabled }}
        - name: PROMETHEUS_STACK_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.prometheusStack.preInstalled }}
        - name: PROMETHEUS_STACK_PRE_INSTALLED
          value: "true"
        {{- end }}
        {{- if .Values.prometheusStack.chartVersion }}
        - name: PROMETHEUS_STACK_CHART_VERSION
          value: {{ .Values.prometheusStack.chartVersion | quote }}
        {{- end }}
        {{- if .Values.prometheusStack.prometheus.enabled }}
        - name: PROMETHEUS_STACK_PROMETHEUS_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.prometheusStack.prometheus.service.type }}
        - name: PROMETHEUS_STACK_PROMETHEUS_SERVICE_TYPE
          value: {{ .Values.prometheusStack.prometheus.service.type | quote }}
        {{- end }}
        {{- if .Values.prometheusStack.prometheus.service.nodePort }}
        - name: PROMETHEUS_STACK_PROMETHEUS_NODE_PORT
          value: {{ .Values.prometheusStack.prometheus.service.nodePort | quote }}
        {{- end }}
        {{- if .Values.prometheusStack.grafana.enabled }}
        - name: PROMETHEUS_STACK_GRAFANA_ENABLED
          value: "true"
        {{- end }}
        {{- if .Values.prometheusStack.grafana.service.type }}
        - name: PROMETHEUS_STACK_GRAFANA_SERVICE_TYPE
          value: {{ .Values.prometheusStack.grafana.service.type | quote }}
        {{- end }}
        {{- if .Values.prometheusStack.grafana.service.nodePort }}
        - name: PROMETHEUS_STACK_GRAFANA_NODE_PORT
          value: {{ .Values.prometheusStack.grafana.service.nodePort | quote }}
        {{- end }}
        # Dashboards default true, so the value is always set explicitly —
        # the if-true gating used above cannot express "false".
        - name: PROMETHEUS_STACK_DASHBOARDS_ENABLED
          value: {{ .Values.prometheusStack.dashboards.enabled | quote }}
        {{- if .Values.prometheusStack.dashboards.internal }}
        - name: PROMETHEUS_STACK_DASHBOARDS_INTERNAL
          value: "true"
        {{- end }}
        {{- if .Values.prometheusAgent.enabled }}
        - name: PROMETHEUS_AGENT_ENABLED
          value: "true"
        - name: PROMETHEUS_AGENT_CLUSTER_LABEL
          value: {{ .Values.prometheusAgent.clusterLabel | quote }}
        - name: PROMETHEUS_AGENT_REMOTE_WRITE_URL
          value: {{ .Values.prometheusAgent.remoteWrite.url | quote }}
        {{- $prometheusAgentAuthSecret := .Values.prometheusAgent.remoteWrite.auth.existingSecret }}
        {{- if $prometheusAgentAuthSecret }}
        - name: PROMETHEUS_AGENT_REMOTE_WRITE_EXISTING_SECRET
          value: {{ $prometheusAgentAuthSecret | quote }}
        {{- end }}
        - name: PROMETHEUS_AGENT_REMOTE_WRITE_INSECURE_SKIP_VERIFY
          value: {{ .Values.prometheusAgent.remoteWrite.tls.insecureSkipVerify | quote }}
        {{- end }}
        # AppBundle importer
        - name: APPBUNDLE_IMPORT_ENABLED
          value: {{ ternary "true" "false" .Values.appBundleImport.enabled | quote }}
        - name: APPBUNDLE_IMPORT_MANAGE_LIFECYCLE
          value: {{ ternary "true" "false" .Values.appBundleImport.manageLifecycle | quote }}
        {{- if .Values.appBundleImport.provider }}
        - name: APPBUNDLE_IMPORT_PROVIDER
          value: {{ .Values.appBundleImport.provider | quote }}
        {{- end }}
        {{- if .Values.appBundleImport.interval }}
        - name: APPBUNDLE_IMPORT_INTERVAL
          value: {{ .Values.appBundleImport.interval | quote }}
        {{- end }}
        {{- if .Values.appBundleImport.crNamespace }}
        - name: APPBUNDLE_IMPORT_CR_NAMESPACE
          value: {{ .Values.appBundleImport.crNamespace | quote }}
        {{- end }}
        {{- if .Values.debug.logLevel }}
        - name: LOG_LEVEL
          value: {{ .Values.debug.logLevel }}
        {{- end }}

        {{- if not (and .Values.dev.enabled .Values.dev.disableProbes) }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ .Values.controllerManager.healthProbe.port }}
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: {{ .Values.controllerManager.healthProbe.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- end }}
        {{- if and .Values.dev.enabled (and .Values.dev.startupProbe (not .Values.dev.disableProbes)) }}
        startupProbe:
{{ toYaml .Values.dev.startupProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.dev.enabled }}
        volumeMounts:
        - name: go-cache
          mountPath: /home/nonroot/go/pkg/mod
          subPath: gomod
        - name: go-cache
          mountPath: /home/nonroot/.cache/go-build
          subPath: gobuild
        {{- end }}
        resources:
          {{- toYaml .Values.controllerManager.manager.resources | nindent 10 }}
      serviceAccountName: {{ if .Values.mode.write.enabled }}{{ .Values.rbac.serviceAccounts.write.name }}{{ else }}{{ .Values.rbac.serviceAccounts.agent.name }}{{ end }}
      terminationGracePeriodSeconds: 10
      {{- if .Values.dev.enabled }}
      volumes:
      - name: go-cache
        persistentVolumeClaim:
          claimName: {{ .Values.dev.persistentCache.pvcName }}
      {{- end }}
