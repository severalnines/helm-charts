{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: s9s:cluster-read
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["agent.severalnines.com"]
    resources:
      [
        "databaseclusters",
        "databaseoperators",
        "databasebackups",
        "databasebackupschedules",
        "appbundles",
        "clusterchangerequests",
        "databaseclusters/status",
        "databaseoperators/status",
        "databasebackups/status",
        "databasebackupschedules/status",
        "appbundles/status",
        "clusterchangerequests/status",
        "databaseclusters/finalizers",
        "databaseoperators/finalizers",
        "databasebackups/finalizers",
        "databasebackupschedules/finalizers",
        "appbundles/finalizers",
        "clusterchangerequests/finalizers"
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      [
        "configmaps",
        "services",
        "persistentvolumeclaims",
        "events",
        "pods",
        "pods/log",
        "namespaces",
        "nodes"
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["moco.cybozu.com"]
    resources:
      ["mysqlclusters", "mysqlbackups", "mysqlbackuppolicies", "backuppolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["pxc.percona.com"]
    resources:
      [
        "perconaxtradbclusters",
        "perconaxtradbbackups",
        "perconaxtradbbackupjobs",
        "perconaxtradbrestores"
      ]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["stackgres.io"]
    resources: ["sgclusters", "sgbackups", "sgbackupconfigs", "sgschedules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["elasticsearch.k8s.elastic.co"]
    resources: ["elasticsearches"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: s9s:cluster-read-extra
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets", "serviceaccounts"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: s9s:cluster-write
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      [
        "configmaps",
        "secrets",
        "serviceaccounts",
        "services",
        "persistentvolumeclaims",
        "events",
        "namespaces",
      ]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["agent.severalnines.com"]
    resources:
      [
        "databaseclusters",
        "databaseoperators",
        "databasebackups",
        "databasebackupschedules",
        "appbundles",
        "clusterchangerequests",
        "databaseclusters/status",
        "databaseoperators/status",
        "databasebackups/status",
        "databasebackupschedules/status",
        "appbundles/status",
        "clusterchangerequests/status",
        "databaseclusters/finalizers",
        "databaseoperators/finalizers",
        "databasebackups/finalizers",
        "databasebackupschedules/finalizers",
        "appbundles/finalizers",
        "clusterchangerequests/finalizers",
      ]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters", "backups", "scheduledbackups"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["moco.cybozu.com"]
    resources:
      ["mysqlclusters", "mysqlbackups", "mysqlbackuppolicies", "backuppolicies"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch", "update"]

  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["create", "patch", "update", "delete"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["create", "patch", "update", "delete"]

  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "update", "patch"]
{{- if .Values.sops.enabled }}
---
# CLUS-7183: SOPS GitOps-secrets pipeline.
# - sops-encryption watches `corev1.Secret` cluster-wide (Pattern A trigger).
# - periodic sweep lists `SopsSecret` cluster-wide and filters by source-name label.
# - observer/secret Gets `corev1.Secret` for WaitingOnSecretPR on parent reconcilers.
#
# All user-namespace access is READ-ONLY. The controller never writes
# `corev1.Secret`s in user namespaces — neither data nor metadata. Pattern A
# status surface lives on a CCR in the agent namespace (CCR-as-status), so
# no user-Secret update permission is required. The CCR get/create/update/
# delete verbs come from the write-mode role above (agent.severalnines.com /
# clusterchangerequests).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: s9s:sops-pipeline
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["isindir.github.com"]
    resources: ["sopssecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: s9s:sops-pipeline
  labels:
    {{- include "agent-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: s9s:sops-pipeline
subjects:
  - kind: ServiceAccount
    name: {{ if .Values.mode.write.enabled }}{{ .Values.rbac.serviceAccounts.write.name }}{{ else }}{{ .Values.rbac.serviceAccounts.agent.name }}{{ end }}
    namespace: {{ include "agent-operator.namespace" . }}
{{- end }}
{{- end }}