apiVersion: v2
name: clustercontrol
description: A ClusterControl Helm Chart for Kubernetes

type: application

version: '0.4.0'
appVersion: '2.4.0-20548'

# Third-party charts are mirrored to our Google Artifact Registry so upstream
# repos pruning a release (e.g. mysql-operator 2.0.21) cannot break our builds.
# To bump a version: update it here (and values.yaml overrides, if any), then run
# scripts/mirror-to-gar.sh — it reads versions from this file and the rendered
# chart, and copies the new chart + images to GAR.
dependencies:
  - name: mysql-operator
    version: 2.0.21
    repository: oci://europe-docker.pkg.dev/severalnines-public/clustercontrol/helm-charts
    condition: installMysqlOperator
  - name: mysql-innodbcluster
    version: 2.0.21
    repository: oci://europe-docker.pkg.dev/severalnines-public/clustercontrol/helm-charts
    condition: createDatabases
  - name: victoria-metrics-single
    repository: oci://europe-docker.pkg.dev/severalnines-public/clustercontrol/helm-charts
    version: 0.9.16
    condition: monitoring.enabled
    alias: monitoring
  - name: ingress-nginx
    repository: oci://europe-docker.pkg.dev/severalnines-public/clustercontrol/helm-charts
    version: 4.11.8
    condition: ingressController.enabled
