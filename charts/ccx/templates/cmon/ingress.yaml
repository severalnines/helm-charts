apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ccx.name" . }}-ccv2-ingress
  annotations:
    kubernetes.io/tls-acme: "true"
    {{ if .Values.ccx.ingress.ssl.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ccx.ingress.ssl.clusterIssuer }}
    {{ end }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/allow-cross-namespace-resources: "false"
    nginx.ingress.kubernetes.io/strict-validate-path-type: "true"
    nginx.ingress.kubernetes.io/annotations-risk-level: "High"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    {{- if .Values.ccx.ingress.whitelist  }}
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ .Values.ccx.ingress.whitelist }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ccx.ingress.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - {{ include "ccx.ccFQDN" . }}
      secretName: {{ include "ccx.ccFQDN" . }}
  rules:
    - host: {{ include "ccx.ccFQDN" . }}
      http:
        paths:
          - backend:
              service:
                name: ccv2-mcc
                port:
                  number: 19051 #ccv2
            path: /
            pathType: Prefix
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ccx.name" . }}-cmon-ingress-ssl
  annotations:
    kubernetes.io/tls-acme: "true"
    {{- if .Values.ccx.ingress.ssl.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ccx.ingress.ssl.clusterIssuer }}
    {{- end }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: {{ .Values.ccx.ingress.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - {{ include "ccx.ccFQDN" . }}
      secretName: {{ include "ccx.ccFQDN" . }}
  rules:
    - host: {{ include "ccx.ccFQDN" . }}
      http:
        paths:
          - path: /cmon/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cmon-master
                port:
                  number: 9501

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ccx.name" . }}-cmon-ssh-ingress
  annotations:
    kubernetes.io/tls-acme: "true"
    {{ if .Values.ccx.ingress.ssl.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ccx.ingress.ssl.clusterIssuer }}
    {{ end }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ccx.ingress.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - {{ include "ccx.ccFQDN" . }}
      secretName: {{ include "ccx.ccFQDN" . }}
  rules:
    - host: {{ include "ccx.ccFQDN" . }}
      http:
        paths:
          - path: /cmon/v2/cmon-ssh/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cmon-master
                port:
                  number: 9511
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ccx.name" . }}-websocket-cmon-ssh-ingress
  annotations:
    kubernetes.io/tls-acme: "true"
    {{ if .Values.ccx.ingress.ssl.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ccx.ingress.ssl.clusterIssuer }}
    {{ end }}
    nginx.ingress.kubernetes.io/rewrite-target: /cmon/ws/$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
spec:
  ingressClassName: {{ .Values.ccx.ingress.ingressClassName | default "nginx" }}
  tls:
    - hosts:
        - {{ include "ccx.ccFQDN" . }}
      secretName: {{ include "ccx.ccFQDN" . }}
  rules:
    - host: {{ include "ccx.ccFQDN" . }}
      http:
        paths:
          - path: /cmon-ssh/cmon/ws/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cmon-master
                port:
                  number: 9511
