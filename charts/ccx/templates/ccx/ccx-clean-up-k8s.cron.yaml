apiVersion: batch/v1
kind: CronJob
metadata:
  name: ccx-clean-up-k8s
  labels:
    app: ccx-clean-up-k8s
spec:
  suspend: {{ or .Values.ccx.env.DISABLE_ROLLBACK .Values.ccx.services.datastorestorage.cleanUpK8sResources.disabled | default "false" }}
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: ccx-clean-up-k8s
    spec:
      template:
        metadata:
          labels:
            app: ccx-clean-up-k8s
        spec:
        {{- with .Values.ccx.services.datastorestorage.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ccx.services.datastorestorage.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ccx.services.datastorestorage.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
        {{- end }}
          restartPolicy: Never
          {{- if .Values.ccx.imagePullSecret }}
          imagePullSecrets:
            - name: {{ .Values.ccx.imagePullSecret }}
          {{- end }}
          containers:
            - name: ccx-clean-up-k8s
              image: {{ .Values.ccx.services.stores_service.image | default .Values.ccx.backend.image | required "No image set for stores" }}
              command: ["/bin/ccx-stores", "clean-up-k8s"]
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              envFrom:
                - configMapRef:
                    name: ccx
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
