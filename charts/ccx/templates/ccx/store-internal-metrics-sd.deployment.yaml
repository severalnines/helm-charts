apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-internal-metrics-sd
  labels:
    app: store-internal-metrics-sd
    run: store-internal-metrics-sd
spec:
  replicas: {{ .Values.global.replicas | default 1 }}
  selector:
    matchLabels:
      app: store-internal-metrics-sd
      run: store-internal-metrics-sd
  template:
    metadata:
      labels:
        app: store-internal-metrics-sd
        run: store-internal-metrics-sd
    spec:
      containers:
        - name: store-internal-metrics-sd
          image: {{ .Values.ccx.backend.image | required "No image set for backend" }}
          command: [ "/bin/internal-metrics-sd" ]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - secretRef:
                name: db
          ports:
            - name: service
              containerPort: 8080
              protocol: TCP